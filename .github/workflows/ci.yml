# ossplate:workflow-name:start
name: Ossplate CI
# ossplate:workflow-name:end

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  template-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: cargo run --quiet --manifest-path core-rs/Cargo.toml -- validate
      - run: cargo run --quiet --manifest-path core-rs/Cargo.toml -- sync --check
      - run: node --test ./scripts/validate-template-readiness.test.mjs

  rust:
    needs: template-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
        working-directory: ./core-rs
      - run: cargo clippy -- -D warnings
        working-directory: ./core-rs
      - run: cargo test
        working-directory: ./core-rs

  js:
    needs: template-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: ./wrapper-js/package-lock.json
      - run: npm ci --omit=optional
        working-directory: ./wrapper-js
      - run: npm run build
        working-directory: ./wrapper-js
      - run: npm test
        working-directory: ./wrapper-js
      - run: npm pack --dry-run
        working-directory: ./wrapper-js

  js-runtime:
    needs: template-readiness
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            package_dir: wrapper-js/platform-packages/ossplate-linux-x64
          - runner: macos-14
            package_dir: wrapper-js/platform-packages/ossplate-darwin-arm64
          - runner: macos-15-intel
            package_dir: wrapper-js/platform-packages/ossplate-darwin-x64
          - runner: windows-latest
            package_dir: wrapper-js/platform-packages/ossplate-win32-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Build core binary
        run: cargo build --manifest-path core-rs/Cargo.toml
      - run: npm pack --dry-run
        working-directory: ./${{ matrix.package_dir }}

  python:
    needs: template-readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Test and build
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install build
          python -m unittest discover -s tests -p 'test_*.py'
        working-directory: ./wrapper-py

  python-wheel:
    needs: template-readiness
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-x64
          - runner: macos-14
            target: darwin-arm64
          - runner: macos-15-intel
            target: darwin-x64
          - runner: windows-latest
            target: win32-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Build core binary
        run: cargo build --manifest-path core-rs/Cargo.toml
      - name: Validate wheel artifact
        env:
          OSSPLATE_PY_TARGET: ${{ matrix.target }}
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install build
          python -m unittest discover -s tests -p 'test_*.py'
        working-directory: ./wrapper-py
