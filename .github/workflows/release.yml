# ossplate:workflow-name:start
name: Ossplate release
# ossplate:workflow-name:end

on:
  workflow_run:
    workflows: ["Ossplate CI"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Ensure release matches the validated commit
        id: validated
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "::notice title=release::manual dispatch requested; validating current main HEAD."
            echo "validated_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            if [ "$HEAD_SHA" != "${{ github.event.workflow_run.head_sha }}" ]; then
              echo "::notice title=release::main advanced beyond the validated commit; waiting for the newer CI run."
              echo "proceed=false" >> "$GITHUB_OUTPUT"
            else
              echo "validated_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
              echo "proceed=true" >> "$GITHUB_OUTPUT"
            fi
          fi
      - name: Skip release commits
        id: commit
        if: steps.validated.outputs.proceed == 'true'
        run: |
          SUBJECT=$(git log -1 --pretty=%s "${{ steps.validated.outputs.validated_sha }}")
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"
          if echo "$SUBJECT" | grep -q '^Release ossplate '; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Plan version bump
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true'
        id: plan
        run: |
          PLAN=$(node ./scripts/release-plan.mjs)
          echo "$PLAN"
          echo "should_release=$(printf '%s' "$PLAN" | node -e "process.stdout.write(String(JSON.parse(require('fs').readFileSync(0, 'utf8')).shouldRelease))")" >> "$GITHUB_OUTPUT"
          echo "next_version=$(printf '%s' "$PLAN" | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync(0, 'utf8')).nextVersion)")" >> "$GITHUB_OUTPUT"
      - name: Assert release state
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: node ./scripts/release-check.mjs release-state
      - name: Determine JS lockfile mode
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        id: js_mode
        shell: bash
        run: |
          VERSION=$(node -p "require('./wrapper-js/package.json').version")
          if npm view "ossplate@$VERSION" version >/dev/null 2>&1; then
            echo "lockfile_mode=resolved" >> "$GITHUB_OUTPUT"
          else
            echo "lockfile_mode=placeholder" >> "$GITHUB_OUTPUT"
          fi
      - name: Assert JS lockfile state
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: node ./scripts/assert-js-lockfile-state.mjs "${{ steps.js_mode.outputs.lockfile_mode }}"
      - name: Assert publish readiness
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: node ./scripts/release-check.mjs publish-readiness release "${{ steps.plan.outputs.next_version }}"
      - name: Set up git identity
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Prepare embedded template artifact
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: node ./scripts/stage-distribution-assets.mjs embedded-template
      - name: Bump versions
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: node ./scripts/bump-version.mjs "${{ steps.plan.outputs.next_version }}"
      - name: Verify release state
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: ./scripts/verify-release.sh placeholder
      - name: Commit and tag release
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.plan.outputs.next_version }}"
          git add -A
          git commit -m "Release ossplate ${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"
      - name: Dispatch publish workflows
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.plan.outputs.next_version }}"
          RELEASE_SHA=$(git rev-parse HEAD)
          DISPATCHED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          gh workflow run publish.yml --ref main
          gh workflow run publish-npm.yml --ref main
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "dispatched_at=$DISPATCHED_AT" >> "$GITHUB_OUTPUT"
          echo "::notice title=release::dispatched publish workflows for v${VERSION}."
      - name: Wait for publish workflows
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.plan.outputs.next_version }}"
          RELEASE_SHA="${{ steps.dispatch.outputs.release_sha }}"
          DISPATCHED_AT="${{ steps.dispatch.outputs.dispatched_at }}"

          find_run_id() {
            local workflow_name="$1"
            gh run list \
              --workflow "$workflow_name" \
              --branch main \
              --event workflow_dispatch \
              --json databaseId,createdAt,headSha \
            | node -e '
              const fs = require("node:fs");
              const workflowRuns = JSON.parse(fs.readFileSync(0, "utf8"));
              const dispatchedAt = Date.parse(process.argv[1]);
              const releaseSha = process.argv[2];
              const match = workflowRuns.find((run) =>
                run.headSha === releaseSha && Date.parse(run.createdAt) >= dispatchedAt
              );
              if (match) process.stdout.write(String(match.databaseId));
            ' "$DISPATCHED_AT" "$RELEASE_SHA"
          }

          wait_for_run() {
            local workflow_name="$1"
            local run_id=""
            for _ in $(seq 1 40); do
              run_id="$(find_run_id "$workflow_name")"
              if [ -n "$run_id" ]; then
                break
              fi
              sleep 5
            done
            if [ -z "$run_id" ]; then
              echo "::error title=release::failed to find $workflow_name run for v${VERSION}."
              exit 1
            fi
            echo "::notice title=release::$workflow_name run https://github.com/${{ github.repository }}/actions/runs/${run_id}"
            gh run watch "$run_id" --exit-status
          }

          wait_for_run "Ossplate publishing"
          wait_for_run "Ossplate publish-npm"
      - name: Refresh JS lockfile after publish
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: |
          node ./scripts/wait-for-npm-versions.mjs "${{ steps.plan.outputs.next_version }}" \
            ossplate \
            ossplate-darwin-arm64 \
            ossplate-darwin-x64 \
            ossplate-linux-x64 \
            ossplate-windows-x64
      - name: Commit post-publish lockfile sync
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.plan.outputs.next_version }}"
          git fetch origin main
          git reset --hard origin/main
          CURRENT_VERSION=$(node -p "require('./wrapper-js/package.json').version")
          if [ "$CURRENT_VERSION" != "$VERSION" ]; then
            echo "::notice title=release::post-publish JS lockfile sync skipped because main advanced to $CURRENT_VERSION."
            exit 0
          fi
          node ./scripts/repair-js-lockfile.mjs
          node ./scripts/assert-js-lockfile-state.mjs resolved
          if git diff --quiet -- wrapper-js/package-lock.json; then
            echo "::notice title=release::post-publish JS lockfile already up to date."
            exit 0
          fi
          git add wrapper-js/package-lock.json
          git commit -m "Sync JS lockfile after ossplate ${VERSION} release [skip ci]"
          if ! git push origin main; then
            echo "::notice title=release::post-publish JS lockfile sync could not be pushed because main moved. Rerun the lockfile sync on current main if it is still needed."
          fi
      - name: Create GitHub release
        if: steps.validated.outputs.proceed == 'true' && steps.commit.outputs.skip != 'true' && steps.plan.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.plan.outputs.next_version }}"
          if gh release view "v${VERSION}" >/dev/null 2>&1; then
            echo "::notice title=release::GitHub release v${VERSION} already exists; skipping."
            exit 0
          fi
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Automated release for ossplate ${VERSION}."
