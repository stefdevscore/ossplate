# ossplate:workflow-name:start
name: Ossplate publish-npm
# ossplate:workflow-name:end

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish-runtime-npm:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            package_dir: wrapper-js/platform-packages/ossplate-linux-x64
          - runner: macos-14
            package_dir: wrapper-js/platform-packages/ossplate-darwin-arm64
          - runner: macos-15-intel
            package_dir: wrapper-js/platform-packages/ossplate-darwin-x64
          - runner: windows-latest
            package_dir: wrapper-js/platform-packages/ossplate-win32-x64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Build core binary
        run: cargo build --manifest-path core-rs/Cargo.toml
      - name: Assert release state
        run: node ./scripts/assert-release-state.mjs
      - name: Assert JS lockfile state
        run: node ./scripts/assert-js-lockfile-state.mjs placeholder
      - name: Assert publish readiness
        run: node ./scripts/assert-publish-readiness.mjs publish
      - name: Detect published version
        id: published
        shell: bash
        working-directory: ./${{ matrix.package_dir }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=npm::${NAME}@${VERSION} is already published; skipping."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.published.outputs.already != 'true'
        shell: bash
        working-directory: ./${{ matrix.package_dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          logfile=$(mktemp)
          cleanup() {
            rm -f "$logfile"
          }
          trap cleanup EXIT
          set +e
          npm publish --access public --provenance 2>&1 | tee "$logfile"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::notice title=npm::published with OIDC trusted publishing."
            exit 0
          fi
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error title=npm::OIDC publish failed and NPM_TOKEN is not configured."
            exit "$status"
          fi
          if grep -qiE "already exists|cannot publish over|previously published" "$logfile"; then
            echo "::notice title=npm::package version already exists; skipping."
            exit 0
          fi
          echo "::warning title=npm::OIDC publish failed; retrying with NPM_TOKEN fallback."
          npm publish --access public

  publish-npm:
    needs: publish-runtime-npm
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: ./wrapper-js/package-lock.json
      - name: Assert release state
        run: node ./scripts/assert-release-state.mjs
      - name: Assert JS lockfile state
        run: node ./scripts/assert-js-lockfile-state.mjs placeholder
      - name: Assert publish readiness
        run: node ./scripts/assert-publish-readiness.mjs publish
      - name: Detect published version
        id: published
        working-directory: ./wrapper-js
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=npm::${NAME}@${VERSION} is already published; skipping."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify runtime package availability
        if: steps.published.outputs.already != 'true'
        working-directory: ./wrapper-js
        run: |
          node - <<'NODE'
          const pkg = require("./package.json");
          const { execFileSync } = require("node:child_process");
          for (const [name, version] of Object.entries(pkg.optionalDependencies ?? {})) {
            try {
              execFileSync("npm", ["view", `${name}@${version}`, "version"], {
                stdio: "ignore"
              });
            } catch {
              throw new Error(`required runtime package ${name}@${version} is not available on npm`);
            }
          }
          NODE
      - name: Build top-level npm package
        if: steps.published.outputs.already != 'true'
        working-directory: ./wrapper-js
        run: npm run build
      - name: Publish to npm
        if: steps.published.outputs.already != 'true'
        working-directory: ./wrapper-js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          logfile=$(mktemp)
          cleanup() {
            rm -f "$logfile"
          }
          trap cleanup EXIT
          set +e
          npm publish --access public --provenance 2>&1 | tee "$logfile"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "::notice title=npm::published with OIDC trusted publishing."
            exit 0
          fi
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error title=npm::OIDC publish failed and NPM_TOKEN is not configured."
            exit "$status"
          fi
          if grep -qiE "already exists|cannot publish over|previously published" "$logfile"; then
            echo "::notice title=npm::package version already exists; skipping."
            exit 0
          fi
          echo "::warning title=npm::OIDC publish failed; retrying with NPM_TOKEN fallback."
          npm publish --access public
