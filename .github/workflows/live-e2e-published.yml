# ossplate:workflow-name:start
name: Ossplate live-e2e
# ossplate:workflow-name:end

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  live-e2e:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'release'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            mode: cargo
          - runner: macos-14
            mode: cargo
          - runner: macos-15-intel
            mode: cargo
          - runner: windows-latest
            mode: cargo
          - runner: ubuntu-latest
            mode: npm
          - runner: macos-14
            mode: npm
          - runner: macos-15-intel
            mode: npm
          - runner: windows-latest
            mode: npm
          - runner: ubuntu-latest
            mode: python
          - runner: macos-14
            mode: python
          - runner: macos-15-intel
            mode: python
          - runner: windows-latest
            mode: python
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Run published live E2E
        shell: bash
        run: ./scripts/live-e2e.sh ${{ matrix.mode }}
