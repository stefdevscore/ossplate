[project]
name = "Ossplate"
description = "Scaffold and maintain one Rust-core CLI that ships cleanly through Cargo, npm, and PyPI."
repository = "https://github.com/stefdevscore/ossplate"
license = "Unlicense"

[author]
name = "Stef"
email = "stefdevscore@github.com"

[packages]
rust_crate = "ossplate"
npm_package = "ossplate"
python_package = "ossplate"
command = "ossplate"

[template]
is_canonical = true
scaffold_version = 3

[metadata]
rust_keywords = ["cli", "bootstrap", "distribution", "packaging", "multi-registry"]
rust_categories = ["command-line-utilities", "development-tools"]
npm_keywords = ["cli", "bootstrap", "distribution", "packaging", "multi-registry", "rust", "python", "npm"]
python_keywords = ["cli", "bootstrap", "distribution", "packaging", "multi-registry", "rust", "python", "npm"]
python_classifiers = [
  "Development Status :: 4 - Beta",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Topic :: Software Development :: Build Tools",
  "Topic :: Software Development :: Code Generators",
  "Topic :: Utilities",
  "License :: Public Domain",
  "Operating System :: OS Independent",
]
